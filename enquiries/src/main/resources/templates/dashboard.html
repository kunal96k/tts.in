<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <link th:href="@{/assets/img/logo/tts-logo-ev.png}" rel="icon">
  <link th:href="@{/assets/img/logo/tts-logo-ev.png}" rel="apple-touch-icon">
  <script>
    (function () {
      try {
        const savedTheme = localStorage.getItem('theme');
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      } catch (e) {
        console.warn('localStorage is blocked:', e);
      }
    })();
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0F1E3A" />
  <title>Admin Dashboard | TechnoKraft Training & Solution</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <!-- Select2 -->
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Michroma&display=swap"
    rel="stylesheet" />
  <!-- SweetAlert2 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">

  <style>
    @font-face {
      font-family: 'Neuropol';
      src: url('/fonts/Neuropol.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }

    :root {
      --canvas: #F5F7FB;
      --surface: #FFFFFF;
      --surface-alt: #FAFBFD;
      --ink: #161A23;
      --ink-soft: #3D4456;
      --muted: #6B7280;
      --border: #E3E6EC;
      --border-soft: #ECEEF2;
      --accent: #2451E3;
      --accent-hover: #1B3FBE;
      --accent-soft: #EAF0FE;
      --accent-deep: #16348C;
      --amber: #E8920B;
      --success: #168A4F;
      --success-soft: #E7F6EE;
      --danger: #D6483D;
      --radius-sm: 8px;
      --radius: 12px;
      --radius-lg: 22px;
      --font-display: 'Space Grotesk', sans-serif;
      --font-body: 'Inter', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
      --shadow-card: 0 24px 64px -28px rgba(22, 52, 138, 0.18), 0 2px 10px rgba(20, 24, 35, 0.04);
    }

    [data-theme="dark"] {
      --canvas: #0B0F19;
      --surface: #121826;
      --surface-alt: #171E30;
      --ink: #F3F4F6;
      --ink-soft: #D1D5DB;
      --muted: #9CA3AF;
      --border: #242F41;
      --border-soft: #1E293B;
      --accent: #3B82F6;
      --accent-hover: #2563EB;
      --accent-soft: rgba(59, 130, 246, 0.15);
      --accent-deep: #60A5FA;
      --amber: #F59E0B;
      --success: #10B981;
      --success-soft: rgba(16, 185, 129, 0.15);
      --danger: #EF4444;
      --shadow-card: 0 24px 64px -28px rgba(0, 0, 0, 0.7), 0 2px 10px rgba(0, 0, 0, 0.5);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      overflow-x: hidden;
      scrollbar-gutter: stable;
    }

    html.swal2-shown,
    body.swal2-shown,
    html.modal-open,
    body.modal-open {
      scrollbar-gutter: stable !important;
    }

    body.swal2-shown,
    body.modal-open {
      padding-right: 0 !important;
    }

    body {
      font-family: var(--font-body);
      background: var(--canvas);
      color: var(--ink);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    .site-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 73px;
      z-index: 50;
      background: var(--surface);
      padding: 14px 24px;
      box-shadow: 0 1px 0 var(--border-soft), 0 4px 12px rgba(0, 0, 0, .03);
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 5px;
      text-decoration: none;
    }

    .logo-mark {
      position: relative;
      width: 44px;
      height: 44px;
      flex-shrink: 0;
    }

    .logo-mark img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 2px 6px rgba(0, 0, 0, .08));
    }

    .logo-fallback {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      display: none;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: .9rem;
      letter-spacing: .02em;
    }

    .brand-info {
      display: flex;
      flex-direction: column;
      line-height: 1.25;
    }

    .brand-text {
      font-family: 'Neuropol', sans-serif;
      font-weight: 400;
      font-size: 1.15rem;
      color: var(--ink);
      letter-spacing: 1px;
    }

    .brand-sub {
      font-family: 'Neuropol', sans-serif;
      font-size: .5rem;
      color: var(--muted);
      letter-spacing: .5px;
      text-transform: uppercase;
      margin-top: 2px;
      margin-left: 5px;
    }

    @media (min-width: 768px) {
      .border-end-md {
        border-right: 1px solid var(--border-soft) !important;
      }
    }

    /* ── MOBILE DEVICE OPTIMIZATIONS ── */
    @media (max-width: 767px) {
      .site-header {
        padding: 10px 12px !important;
      }

      .brand-sub {
        display: none !important;
      }

      .brand-text {
        font-size: 0.95rem !important;
      }

      .site-header .d-flex.align-items-center.gap-3 {
        gap: 8px !important;
      }

      #logoutBtn {
        width: 38px !important;
        height: 38px !important;
        padding: 0 !important;
        border-radius: 50% !important;
        display: inline-flex !important;
        align-items: center !important;
        justify-content: center !important;
      }

      #logoutBtn span {
        display: none !important;
      }

      #logoutBtn i {
        margin: 0 !important;
      }

      .dashboard-shell {
        padding: 16px 12px 48px !important;
      }

      .stat-card {
        padding: 12px !important;
        gap: 8px !important;
        align-items: center !important;
      }

      .stat-label {
        font-size: 0.7rem !important;
      }

      .stat-val {
        font-size: 1.3rem !important;
      }
    }

    /* ── THEME TOGGLE ── */
    .theme-toggle {
      background: var(--surface-alt);
      border: 1px solid var(--border);
      color: var(--ink);
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.1rem;
      transition: background .15s, border-color .15s, transform .15s;
    }

    .theme-toggle:hover {
      background: var(--border-soft);
      transform: scale(1.05);
    }

    /* ── LOGIN CONTAINER ── */
    .login-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-card);
      padding: 40px;
      width: 100%;
      max-width: 440px;
      animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .login-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.6rem;
      color: var(--ink);
      text-align: center;
      margin-bottom: 8px;
    }

    .login-subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
      margin-bottom: 28px;
    }

    /* ── DASHBOARD SHELL ── */
    .dashboard-shell {
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      padding: 32px 24px 64px;
      animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(15px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── STATS CARDS ── */
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .stat-card:hover {
      box-shadow: var(--shadow-card);
    }

    .stat-icon {
      width: 48px !important;
      height: 48px !important;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0 !important;
      align-self: center !important;
    }

    .stat-data {
      display: flex;
      flex-direction: column;
    }

    .stat-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      font-weight: 500;
    }

    .stat-val {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.6rem;
      color: var(--ink);
      line-height: 1.2;
    }

    /* ── CONTROL PANEL & FILTERS ── */
    .dashboard-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
    }

    .btn-action {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 0.88rem;
      padding: 10px 16px;
      border-radius: var(--radius-sm);
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
    }

    .btn-new {
      background: var(--accent);
      color: #fff;
      border: none;
    }

    .btn-new:hover {
      background: var(--accent-hover);
      color: #fff;
      transform: scale(1.02);
    }

    .btn-export-excel {
      background: var(--success-soft);
      color: var(--success);
      border: 1px solid rgba(22, 138, 79, 0.15);
    }

    .btn-export-excel:hover {
      background: rgba(22, 138, 79, 0.1);
      transform: scale(1.02);
    }

    .btn-export-csv {
      background: var(--accent-soft);
      color: var(--accent);
      border: 1px solid rgba(36, 81, 227, 0.15);
    }

    .btn-export-csv:hover {
      background: rgba(36, 81, 227, 0.1);
      transform: scale(1.02);
    }

    /* Inputs Styling */
    .form-control,
    .form-select {
      background-color: var(--surface-alt);
      border: 1px solid var(--border);
      color: var(--ink);
      font-size: 0.88rem;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-control:focus,
    .form-select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
      background-color: var(--surface);
    }

    /* Filter Headers */
    .filter-label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 6px;
    }

    /* ── ENQUIRY TABLE ── */
    .table-container {
      margin-top: 24px;
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }

    .enquiry-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.86rem;
      text-align: left;
    }

    .enquiry-table th {
      background: var(--surface-alt);
      color: var(--ink-soft);
      font-weight: 600;
      padding: 14px 16px;
      border-bottom: 2px solid var(--border);
      user-select: none;
    }

    .enquiry-table td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border-soft);
      vertical-align: middle;
      color: var(--ink);
    }

    .enquiry-table tr:last-child td {
      border-bottom: none;
    }

    .enquiry-table tr:hover td {
      background-color: var(--surface-alt);
    }

    /* Badges & Status */
    .status-select {
      font-weight: 600;
      font-size: 0.76rem;
      padding: 5px 10px;
      border-radius: 100px;
      border: none;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      width: auto;
      display: inline-block;
    }

    .status-new {
      background-color: #FEF3C7;
      color: #92400E;
    }

    [data-theme="dark"] .status-new {
      background-color: rgba(245, 158, 11, 0.15);
      color: #FBBF24;
    }

    .status-contacted {
      background-color: #DBEAFE;
      color: #1E40AF;
    }

    [data-theme="dark"] .status-contacted {
      background-color: rgba(59, 130, 246, 0.15);
      color: #93C5FD;
    }

    .status-enrolled {
      background-color: #D1FAE5;
      color: #065F46;
    }

    [data-theme="dark"] .status-enrolled {
      background-color: rgba(16, 185, 129, 0.15);
      color: #6EE7B7;
    }

    .status-closed {
      background-color: #F3F4F6;
      color: #374151;
    }

    [data-theme="dark"] .status-closed {
      background-color: rgba(156, 163, 175, 0.15);
      color: #D1D5DB;
    }

    /* Action buttons */
    .btn-icon {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.1rem;
      padding: 4px;
      border-radius: 4px;
      transition: color 0.15s, background-color 0.15s;
    }

    .btn-icon:hover {
      color: var(--accent);
      background-color: var(--border-soft);
    }

    .btn-icon-danger:hover {
      color: var(--danger);
      background-color: rgba(214, 72, 61, 0.1);
    }

    /* ── PAGINATION ── */
    .pagination-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 20px;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .pagination-controls {
      display: flex;
      gap: 5px;
    }

    .btn-page {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--ink-soft);
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-weight: 500;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn-page:hover {
      background: var(--surface-alt);
      border-color: var(--ink-soft);
    }

    .btn-page.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .btn-page:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Glassmorphic Modal */
    .modal-content {
      background-color: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-card);
      color: var(--ink);
    }

    .modal-header {
      border-bottom: 1px solid var(--border-soft);
    }

    .modal-footer {
      border-top: 1px solid var(--border-soft);
    }

    /* Select2 overrides for Admin */
    .select2-container {
      width: 100% !important;
    }

    .select2-container--default .select2-selection--single {
      background-color: var(--surface-alt) !important;
      border: 1px solid var(--border) !important;
      height: 40px !important;
      border-radius: var(--radius-sm) !important;
      transition: border-color .25s, box-shadow .25s !important;
    }

    .select2-container--default .select2-selection--single .select2-selection__rendered {
      line-height: 38px !important;
      color: var(--ink) !important;
      padding-left: 14px !important;
    }

    .select2-container--default .select2-selection--single .select2-selection__arrow {
      height: 38px !important;
    }

    .select2-container--default .select2-selection--single .select2-selection__arrow b {
      border-color: var(--muted) transparent transparent !important;
    }

    .select2-container--default.select2-container--open .select2-selection--single .select2-selection__arrow b {
      border-color: transparent transparent var(--muted) !important;
    }

    .select2-container--default.select2-container--focus .select2-selection--single,
    .select2-container--default.select2-container--open .select2-selection--single {
      border-color: var(--accent) !important;
      box-shadow: 0 0 0 3px var(--accent-soft) !important;
    }

    .select2-dropdown {
      background-color: var(--surface) !important;
      border: 1px solid var(--border) !important;
      color: var(--ink) !important;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.15) !important;
    }

    .select2-search--dropdown .select2-search__field {
      background-color: var(--surface-alt) !important;
      border: 1px solid var(--border) !important;
      color: var(--ink) !important;
      border-radius: var(--radius-sm) !important;
      padding: 6px 10px !important;
    }

    .select2-results__option {
      color: var(--ink) !important;
      padding: 8px 14px !important;
    }

    .select2-results__option--highlighted {
      background-color: var(--accent) !important;
      color: #fff !important;
    }

    .select2-container--default .select2-results__option--selected {
      background-color: var(--accent-soft) !important;
      color: var(--ink) !important;
    }

    .select2-results__option[aria-disabled=true] {
      color: var(--muted) !important;
    }

    /* Dark Mode Select2 Tweaks */
    [data-theme="dark"] .select2-container--default .select2-selection--single {
      background-color: var(--surface) !important;
    }

    [data-theme="dark"] .select2-dropdown {
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.5) !important;
    }

    /* Highlight matching search text */
    .highlight {
      background-color: #FEF08A;
      color: #000;
      padding: 0 2px;
      border-radius: 2px;
    }

    /* ── SWEETALERT2 STYLING FOR THEME COMPATIBILITY ── */
    .swal2-popup {
      background: var(--surface) !important;
      color: var(--ink) !important;
      border: 1px solid var(--border) !important;
      border-radius: var(--radius) !important;
      box-shadow: var(--shadow-card) !important;
    }

    .swal2-title {
      color: var(--ink) !important;
      font-family: var(--font-display) !important;
      font-weight: 600 !important;
    }

    .swal2-html-container {
      color: var(--ink-soft) !important;
      font-family: var(--font-body) !important;
    }

    .swal2-confirm {
      border-radius: var(--radius-sm) !important;
      font-weight: 600 !important;
      padding: 10px 24px !important;
    }

    .swal2-cancel {
      border-radius: var(--radius-sm) !important;
      font-weight: 600 !important;
      padding: 10px 24px !important;
    }

    /* Fix SweetAlert2 white/light background lines in Dark Mode */
    .swal2-popup .swal2-success-circular-line-left,
    .swal2-popup .swal2-success-circular-line-right,
    .swal2-popup .swal2-success-fix {
      background-color: transparent !important;
    }

    /* Close button dark mode styling */
    [data-theme="dark"] .btn-close {
      filter: invert(1) grayscale(1) brightness(2);
    }

    /* ── VIEW DETAILS MODAL STYLING ── */
    .view-details-container {
      font-family: var(--font-body);
    }

    .avatar-circle {
      transition: transform 0.2s;
    }

    .avatar-circle:hover {
      transform: scale(1.05);
    }

    .view-details-container .card {
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .view-details-container .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
    }

    [data-theme="dark"] .view-details-container .card:hover {
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
    }

    /* ── CRM LAYOUT WRAPPER & SIDEBAR ── */
    .crm-wrapper {
      display: flex;
      flex: 1;
      position: relative;
      margin-top: 73px;
    }

    .crm-sidebar {
      width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      padding: 24px 0;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .sidebar-header {
      padding: 0 24px 16px;
      border-bottom: 1px solid var(--border-soft);
      margin-bottom: 16px;
    }

    .sidebar-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 0 12px;
    }

    .nav-section-title {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin: 16px 12px 6px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      border-radius: var(--radius-sm);
      color: var(--ink-soft);
      font-size: 0.88rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.15s ease;
    }

    .nav-item i {
      font-size: 1.1rem;
      color: var(--muted);
      transition: color 0.15s ease;
    }

    .nav-item:hover {
      background: var(--border-soft);
      color: var(--ink);
    }

    .nav-item:hover i {
      color: var(--accent);
    }

    .nav-item.active {
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 600;
    }

    .nav-item.active i {
      color: var(--accent);
    }

    .nav-item.disabled {
      opacity: 0.6;
      cursor: not-allowed;
      pointer-events: none;
    }

    .nav-sub-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding-left: 20px;
      margin-top: 2px;
      border-left: 1px dashed var(--border);
      margin-left: 20px;
    }

    .nav-sub-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.15s ease;
    }

    .nav-sub-item:hover {
      color: var(--ink);
    }

    .nav-sub-item.active {
      color: var(--accent);
      font-weight: 600;
    }

    .dashboard-shell {
      flex: 1;
      min-width: 0;
      padding: 32px 24px 64px;
    }

    /* Mobile Responsive Sidebar */
    @media (max-width: 991.98px) {
      .crm-sidebar {
        position: fixed;
        top: 73px;
        left: -260px;
        height: calc(100vh - 73px);
        z-index: 1000;
        box-shadow: var(--shadow-card);
      }

      .crm-sidebar.show {
        left: 0;
      }

      .sidebar-backdrop {
        position: fixed;
        top: 73px;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.4);
        z-index: 999;
        display: none;
        backdrop-filter: blur(2px);
      }

      .sidebar-backdrop.show {
        display: block;
      }

    @media (min-width: 992px) {
      .crm-sidebar {

        left: 0;

      }

      .dashboard-shell {

      function fetchLeads() {
        const page = currentPage - 1; // 0-indexed in backend
        const size = $('#pageSizeSelect').val();
        const sortBy = currentSort.col === 'date' ? 'createdAt' : currentSort.col;
        const sortDir = currentSort.dir;

        const search = $('#searchInput').val().trim();
        const course = $('#courseFilter').val();
        const status = $('#statusFilter').val();
        const dateFrom = $('#dateFromFilter').val();
        const dateTo = $('#dateToFilter').val();

        let url = `/api/leads?page=${page}&size=${size}&sortBy=${sortBy}&sortDir=${sortDir}`;
        if (search) url += `&search=${encodeURIComponent(search)}`;
        if (course && course !== 'all') url += `&course=${encodeURIComponent(course)}`;
        if (status && status !== 'all') url += `&status=${encodeURIComponent(status)}`;
        if (dateFrom) url += `&dateFrom=${dateFrom}`;
        if (dateTo) url += `&dateTo=${dateTo}`;

        $.getJSON(url, function (data) {
          enquiriesList = data.content;
          totalElements = data.totalElements;
          totalPages = data.totalPages;
          renderTable(data);
        }).fail(function () {
          Swal.fire({
            icon: 'error',
            title: 'Load Failed',
            text: 'Could not fetch lead entries from the server.',
            confirmButtonColor: '#D6483D'
          });
        });
      }

      function patchStatus(id, newStatus, selectElement) {
        $.ajax({
          url: `/api/leads/${id}/status?status=${encodeURIComponent(newStatus)}`,
          type: 'PATCH',
          success: function (res) {
            if (res.success) {
              const statusClassMap = {
                'New': 'status-new',
                'Contacted': 'status-contacted',
                'Enrolled': 'status-enrolled',
                'Closed': 'status-closed'
              };
              const newClass = statusClassMap[newStatus] || 'status-new';

              // Synchronize all status select dropdowns for this lead across the page
              $(`.status-select[data-id="${id}"]`)
                .val(newStatus)
                .removeClass('status-new status-contacted status-enrolled status-closed')
                .addClass(newClass);

              // Update top stat cards
              fetchStats();

              Swal.fire({
                icon: 'success',
                title: 'Status Updated',
                text: `Lead status is now ${newStatus}`,
                toast: true,
                position: 'top-end',
                showConfirmButton: false,
                timer: 2000,
                timerProgressBar: true
              });
            }
          },
          error: function () {
            Swal.fire({
              icon: 'error',
              title: 'Update Failed',
              text: 'Could not update status on the server.'
            });
            fetchLeads();
          }
        });
      }

        Swal.fire({

          icon: 'warning',
          showCancelButton: true,
          confirmButtonColor: '#D6483D',
          cancelButtonColor: '#6B7280',
          confirmButtonText: 'Yes, Delete',

        }).then((result) => {
          if (result.isConfirmed) {
            $.ajax({
              url: `/api/leads/${id}`,
              type: 'DELETE',
              success: function (res) {
                if (res.success) {
                  Swal.fire({
                    icon: 'success',

                Swal.fire({
                  icon: 'error',
                  title: 'Delete Failed',
                  text: 'Could not remove the entry.'
                });
              }
            });
          }
        });
      }

      // ── RENDERING ──────────────────────────────────────────────
      function highlightText(text, searchWord) {
        if (!text) return '';
        if (!searchWord) return text;
        const escaped = searchWord.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
        const regex = new RegExp(`(${escaped})`, 'gi');
        return text.replace(regex, '<span class="highlight">$1</span>');
      }

      function renderCourseBadges(service, searchWord) {
        if (!service) return '<span class="badge bg-secondary-subtle text-secondary border" style="font-size:0.72rem;">None</span>';
        const courses = service.split(',').map(c => c.trim()).filter(c => c.length > 0);
        const colors = ['primary', 'success', 'info', 'warning', 'danger'];
        return courses.map((c, i) => {
          const col = colors[i % colors.length];
          return `<span class="badge bg-${col}-subtle text-${col}-emphasis border border-${col}-subtle" style="font-size:0.72rem;white-space:nowrap;">${highlightText(c, searchWord)}</span>`;
        }).join('');
      }

      function renderPagination(totalPages) {
        const $container = $('#paginationPages');
        $container.empty();

        $container.append(`<button class="btn-page" id="btnPrev" ${currentPage === 1 ? 'disabled' : ''}>Previous</button>`);

        const pages = [];
        if (totalPages <= 7) {
          for (let i = 1; i <= totalPages; i++) {
            pages.push(i);
          }
        } else {
          if (currentPage <= 4) {
            pages.push(1, 2, 3, 4, 5, '...', totalPages);
          } else if (currentPage >= totalPages - 3) {
            pages.push(1, '...', totalPages - 4, totalPages - 3, totalPages - 2, totalPages - 1, totalPages);
          } else {
            pages.push(1, '...', currentPage - 1, currentPage, currentPage + 1, '...', totalPages);
          }
        }

        pages.forEach(p => {
          if (p === '...') {
            $container.append(`<span class="px-2 text-muted align-self-center" style="font-weight: 500; font-family: var(--font-mono);">...</span>`);
          } else {
            $container.append(`<button class="btn-page ${p === currentPage ? 'active' : ''}" data-page="${p}">${p}</button>`);
          }
        });

        $container.append(`<button class="btn-page" id="btnNext" ${currentPage === totalPages ? 'disabled' : ''}>Next</button>`);
      }

                  <!-- Academic / Batch Info Section -->
                  <div class="col-md-6">
                    <div class="card h-100 border-0 p-3" style="background: var(--surface-alt); border: 1px solid var(--border-soft) !important; border-radius: var(--radius-sm);">
                      <h6 class="filter-label mb-3 text-primary"><i class="bi bi-journal-bookmark-fill me-2"></i>Academic &amp; Courses</h6>
                      
                      <div class="mb-3">
                        <span class="d-block text-muted mb-1" style="font-size: 0.72rem; font-weight: 600; text-transform: uppercase;">Course(s) Selected</span>
                        <div class="d-flex flex-wrap gap-1">${renderCourseBadges(item.service, '')}</div>
                      </div>
                      
                      <div class="mb-3">
                        <span class="d-block text-muted" style="font-size: 0.72rem; font-weight: 600; text-transform: uppercase;">Qualification</span>
                        <span class="fs-6 fw-medium text-ink-soft"><i class="bi bi-mortarboard me-2 text-muted"></i>${item.qualification || 'Not specified'}</span>
                      </div>
                      
                      <div>
                        <span class="d-block text-muted" style="font-size: 0.72rem; font-weight: 600; text-transform: uppercase;">Preferred Batch Time</span>
                        <span class="fs-6 fw-medium text-ink-soft"><i class="bi bi-clock me-2 text-muted"></i>${item.batch || 'Not specified'}</span>
                      </div>
                    </div>
                  </div>

                  <!-- Message / Remark Section -->
                  <div class="col-12">
                    <div class="card border-0 p-3" style="background: var(--surface-alt); border: 1px solid var(--border-soft) !important; border-radius: var(--radius-sm);">
                      <div class="d-flex justify-content-between align-items-center mb-2">
                        <h6 class="filter-label mb-0 text-primary"><i class="bi bi-chat-left-text-fill me-2"></i>Inquiry Remarks &amp; Message</h6>
                        <span class="text-muted" style="font-size: 0.72rem;"><i class="bi bi-calendar3 me-1"></i>Received: ${formattedDate}</span>
                      </div>
                      <div class="p-3 rounded border bg-body-tertiary" style="color: var(--ink-soft); border-color: var(--border) !important; font-family: var(--font-body); white-space: pre-wrap; font-size: 0.9rem; line-height: 1.5; min-height: 80px;">${item.message || 'No additional remarks.'}</div>
                    </div>
                  </div>
                </div>

                <!-- Footer Quick Actions inside Modal -->
                <div class="d-flex justify-content-end gap-2 mt-4 pt-3 border-top" style="border-color: var(--border-soft) !important;">
                  <button class="btn btn-success px-3 btnWhatsApp" data-id="${item.id}" style="border-radius: var(--radius-sm);">
                    <i class="bi bi-whatsapp me-2"></i>Send WhatsApp Message
                  </button>
                  <button class="btn btn-outline-danger px-3 btnDelete" data-id="${item.id}" data-name="${item.name}" style="border-radius: var(--radius-sm);">
                    <i class="bi bi-trash me-2"></i>Delete Record
                  </button>
                </div>
              </div>
            `;
            $('#detailsModalBody').html(detailHtml);
          }
        });

        // WhatsApp direct chat
        $(document).on('click', '.btnWhatsApp', function () {
          const id = $(this).data('id');
          const item = enquiriesList.find(e => e.id == id);
          if (item) {
            const cleanMobile = item.mobile.replace(/\D/g, '');
            const mobileWithCountry = cleanMobile.length === 10 ? '91' + cleanMobile : cleanMobile;
            const waMsg = encodeURIComponent(
              `Hello ${item.name},\n\n` +
              `Thank you for your enquiry at TechnoKraft for the *${item.service || 'selected'}* course. ` +
              `Our counselor will be in touch with you shortly. Feel free to reply to this chat if you have any questions.`
            );
            window.open(`https://wa.me/${mobileWithCountry}?text=${waMsg}`, '_blank');
          }
        });

        // Delete button click
        $(document).on('click', '.btnDelete', function () {
          const id = $(this).data('id');
          const name = $(this).data('name');
          deleteRecord(id, name);
        });

        // Logout confirmation dialog
        $(document).on('click', '#logoutBtn', function (e) {
          e.preventDefault();
          Swal.fire({
            title: 'Confirm Logout',
            text: 'Are you sure you want to log out from the admin panel?',
            icon: 'question',
            showCancelButton: true,
            confirmButtonColor: '#D6483D',
            cancelButtonColor: '#6B7280',
            confirmButtonText: 'Yes, Logout',
            cancelButtonText: 'Stay Logged In'
          }).then((result) => {
            if (result.isConfirmed) {
              $('#logoutForm').submit();
            }
          });
        });

        // Pagination buttons click
        $('#paginationPages').on('click', '.btn-page', function () {
          const $btn = $(this);
          if ($btn.attr('id') === 'btnPrev') {
            if (currentPage > 1) {
              currentPage--;
              fetchLeads();
            }
          } else if ($btn.attr('id') === 'btnNext') {
            if (currentPage < totalPages) {
              currentPage++;
              fetchLeads();
            }
          } else {
            currentPage = parseInt($btn.data('page'));
            fetchLeads();
          }
        });

        // Submit new enquiry modal
        $('#newEnquiryForm').on('submit', function (e) {
          e.preventDefault();
          const name = $('#newStudentName').val().trim();
          const email = $('#newStudentEmail').val().trim();
          const mobile = $('#newWhatsappNo').val().trim();
          const service = $('#newCourseSelect').val();
          const serviceStr = Array.isArray(service) ? service.join(', ') : service;
          const qualification = $('#newQualification').val();
          const batch = $('#newPreferredTime').val();
          const source = $('#newReferralSource').val();
          const status = $('#newStatus').val();
          const message = $('#newMessage').val().trim();

          const newObj = {
            name: name,
            email: email,
            mobile: mobile,
            service: serviceStr,
            qualification: qualification,
            batch: batch,
            source: source,
            status: status,
            message: message
          };

          $.ajax({
            url: '/api/leads',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(newObj),
            success: function (res) {
              if (res.success) {
                Swal.fire({
                  icon: 'success',
                  title: 'Enquiry Created',
                  text: 'New record has been successfully added.',
                  timer: 2000,
                  showConfirmButton: false
                });

                // Clear modal and close
                $('#newEnquiryForm')[0].reset();
                $('#newCourseSelect').val('').trigger('change');
                $('#newEnquiryModal').modal('hide');

                currentPage = 1;
                fetchLeads();
                fetchStats();
              } else {
                Swal.fire({
                  icon: 'error',
                  title: 'Failed',
                  text: res.message || 'Please check for validation errors.'
                });
              }
            },
            error: function (xhr) {
              let msg = 'Failed to create enquiry.';
              if (xhr.responseJSON && xhr.responseJSON.errors) {
                msg = Object.values(xhr.responseJSON.errors).join('<br>');
              }
              Swal.fire({
                icon: 'error',
                title: 'Creation Failed',
                html: msg
              });
            }
          });
        });

        // Export data to Excel
        $('#btnExportExcel').on('click', function () {
          const sortBy = currentSort.col === 'date' ? 'createdAt' : currentSort.col;
          const sortDir = currentSort.dir;
          const search = $('#searchInput').val().trim();
          const course = $('#courseFilter').val();
          const status = $('#statusFilter').val();
          const dateFrom = $('#dateFromFilter').val();
          const dateTo = $('#dateToFilter').val();

          let url = `/api/leads/export/excel?sortBy=${sortBy}&sortDir=${sortDir}`;
          if (search) url += `&search=${encodeURIComponent(search)}`;
          if (course && course !== 'all') url += `&course=${encodeURIComponent(course)}`;
          if (status && status !== 'all') url += `&status=${encodeURIComponent(status)}`;
          if (dateFrom) url += `&dateFrom=${dateFrom}`;
          if (dateTo) url += `&dateTo=${dateTo}`;

          window.location.href = url;
        });

        // Export data to CSV
        $('#btnExportCsv').on('click', function () {
          const sortBy = currentSort.col === 'date' ? 'createdAt' : currentSort.col;
          const sortDir = currentSort.dir;
          const search = $('#searchInput').val().trim();
          const course = $('#courseFilter').val();
          const status = $('#statusFilter').val();
          const dateFrom = $('#dateFromFilter').val();
          const dateTo = $('#dateToFilter').val();

          let url = `/api/leads/export?sortBy=${sortBy}&sortDir=${sortDir}`;
          if (search) url += `&search=${encodeURIComponent(search)}`;
          if (course && course !== 'all') url += `&course=${encodeURIComponent(course)}`;
          if (status && status !== 'all') url += `&status=${encodeURIComponent(status)}`;
          if (dateFrom) url += `&dateFrom=${dateFrom}`;
          if (dateTo) url += `&dateTo=${dateTo}`;

          window.location.href = url;
        });
      }

      function toggleSort(col) {
        if (currentSort.col === col) {
          currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
        } else {
          currentSort.col = col;
          currentSort.dir = 'desc';
        }
        currentPage = 1;
        fetchLeads();
      }
    })();
  </script>
</body>

</html>
