<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>400 - Bad Request | TechnoKraft</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --canvas: #F5F7FB;
      --surface: #FFFFFF;
      --ink: #161A23;
      --muted: #6B7280;
      --accent: #2451E3;
      --accent-hover: #1B3FBE;
      --border: #E3E6EC;
    }
    [data-theme="dark"] {
      --canvas: #0B0F19;
      --surface: #121826;
      --ink: #F3F4F6;
      --muted: #9CA3AF;
      --accent: #3B82F6;
      --accent-hover: #2563EB;
      --border: #242F41;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--canvas);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .error-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      box-shadow: 0 24px 64px -28px rgba(0,0,0,0.1);
    }
    .error-code {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 6rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 16px;
      letter-spacing: -2px;
    }
    .error-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .error-desc {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .btn-home {
      background: var(--accent);
      color: #fff;
      border: none;
      font-weight: 600;
      padding: 12px 24px;
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.15s, transform 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-home:hover {
      background: var(--accent-hover);
      color: #fff;
      transform: translateY(-1px);
    }
  </style>
  <script>
    try {
      const savedTheme = localStorage.getItem('theme');
      const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    } catch (e) {
      console.warn('localStorage is blocked:', e);
    }
  </script>
</head>
<body>
  <div class="error-card">
    <div class="error-code">400</div>
    <h1 class="error-title">Bad Request</h1>
    <p class="error-desc">The request could not be understood or processed by the server. Please check the submission data and try again.</p>
    <a href="/" class="btn-home">
      <i class="bi bi-house-door-fill"></i> Back to Home
    </a>
  </div>
</body>
</html>
