<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Layout Fragments</title>
</head>
<body>

  <!-- ========================================== -->
  <!-- HEADER FRAGMENT                            -->
  <!-- ========================================== -->
  <header th:fragment="header" class="site-header" id="mainHeader">
    <div class="header-inner">
      <div class="d-flex align-items-center gap-1">
        <button id="sidebarToggle" class="btn btn-icon d-lg-none text-muted p-1 me-1" style="font-size: 1.4rem;"
          aria-label="Toggle Navigation">
          <i class="bi bi-list"></i>
        </button>
        <a th:href="@{/}" class="logo-container">
          <div class="logo-mark">
            <img th:src="@{/assets/img/logo/tts-logo-ev.png}" alt="TechnoKraft Logo"
              style="height: 44px; width: auto; max-width: 100%; object-fit: contain;" />
          </div>
          <div class="brand-info">
            <div class="d-flex align-items-center gap-2">
              <span class="brand-text">TechnoKraft</span>
              <span class="badge bg-secondary-subtle text-secondary-emphasis border px-2 py-0.5"
                style="font-size: 0.65rem; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase;">Admin</span>
            </div>
            <span class="brand-sub">Training &amp; Solution Pvt. Ltd.</span>
          </div>
        </a>
      </div>

      <div class="d-flex align-items-center gap-3">
        <!-- User Display Profile -->
        <span class="badge bg-light text-dark border px-3 py-2 rounded-pill d-none d-md-inline-block"
          style="font-weight: 600;">
          <i class="bi bi-person-circle me-1 text-primary"></i> <span
            th:text="${username != null ? username : 'Admin User'}">Admin</span>
        </span>
        <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
          <i class="bi bi-moon-stars-fill"></i>
        </button>
        <button id="logoutBtn" class="btn btn-outline-danger btn-sm rounded-pill px-3">
          <i class="bi bi-box-arrow-right me-1"></i> <span>Logout</span>
        </button>
        <form id="logoutForm" th:action="@{/logout}" method="post" style="display:none;"></form>
      </div>
    </div>
  </header>

  <!-- ========================================== -->
  <!-- SIDEBAR FRAGMENT                           -->
  <!-- ========================================== -->
  <aside th:fragment="sidebar(activeTab)" class="crm-sidebar" id="crmSidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Menu Navigation</span>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-title">Core Modules</div>
      <a th:href="@{/dashboard}" class="nav-item" th:classappend="${activeTab == 'enquiries'} ? 'active'">
        <i class="bi bi-people-fill"></i>
        <span>Enquiries CRM</span>
      </a>
      <a th:href="@{/dashboard/offers}" class="nav-item" th:classappend="${activeTab == 'offers'} ? 'active'">
        <i class="bi bi-gift-fill"></i>
        <span>Offers Module</span>
      </a>
      
      <!-- Sub-navigation list for Offers page -->
      <div class="nav-sub-list" th:if="${activeTab == 'offers'}">
        <a class="nav-sub-item active" data-tab="tab-analytics">
          <i class="bi bi-graph-up"></i> Analytics
        </a>
        <a class="nav-sub-item" data-tab="tab-prizes">
          <i class="bi bi-trophy-fill"></i> Prize Config
        </a>
        <a class="nav-sub-item" data-tab="tab-participants">
          <i class="bi bi-people-fill"></i> Participants
        </a>
        <a class="nav-sub-item" data-tab="tab-winners">
          <i class="bi bi-award-fill"></i> Winners
        </a>
        <a class="nav-sub-item" data-tab="tab-verify">
          <i class="bi bi-qr-code-scan"></i> Verification
        </a>
        <a class="nav-sub-item" data-tab="tab-logs">
          <i class="bi bi-clock-history"></i> Offer Logs
        </a>
        <a class="nav-sub-item" data-tab="tab-settings">
          <i class="bi bi-gear-fill"></i> Settings &amp; Control
        </a>
      </div>

      <a href="#" class="nav-item disabled">
        <i class="bi bi-person-check-fill"></i>
        <span>Admissions</span>
        <span class="badge bg-secondary-subtle text-secondary-emphasis ms-auto"
          style="font-size: 0.65rem;">Soon</span>
      </a>
    </nav>
  </aside>

</body>
</html>
